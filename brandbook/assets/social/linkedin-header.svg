<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <title>OpenAEC Foundation — LinkedIn Header Banner</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A32"/>
      <stop offset="100%" stop-color="#36363E"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="accentStrip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FAFAF9" stroke-width="0.4"/>
    </pattern>
    <clipPath id="bannerClip">
      <rect width="1584" height="396" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="1584" height="396" fill="url(#bgGrad)"/>

    <!-- Blueprint grid (subtle) -->
    <rect width="1584" height="396" fill="url(#grid)" opacity="0.15"/>

    <!-- Accent gradient strip at bottom -->
    <rect x="0" y="392" width="1584" height="4" fill="url(#accentStrip)"/>

    <!-- ===== LEFT ZONE: Isometric cityscape ===== -->

    <!-- Large building cluster — left -->
    <g transform="translate(100,180)" opacity="0.20">
      <polygon points="0,-120 55,-90 55,30 0,60 -55,30 -55,-90" fill="none" stroke="#D97706" stroke-width="2.5"/>
      <line x1="0" y1="-120" x2="0" y2="0" stroke="#D97706" stroke-width="1.5"/>
      <line x1="55" y1="-90" x2="0" y2="0" stroke="#D97706" stroke-width="1.5"/>
      <line x1="-55" y1="-90" x2="0" y2="0" stroke="#D97706" stroke-width="1.5"/>
      <polygon points="0,-120 55,-90 0,0 -55,-90" fill="#D97706" opacity="0.15"/>
      <!-- Windows -->
      <g stroke="#D97706" stroke-width="0.8" fill="#D97706" fill-opacity="0.2">
        <rect x="-38" y="-65" width="9" height="6"/>
        <rect x="-25" y="-65" width="9" height="6"/>
        <rect x="-38" y="-52" width="9" height="6"/>
        <rect x="-25" y="-52" width="9" height="6"/>
        <rect x="-38" y="-39" width="9" height="6"/>
        <rect x="-25" y="-39" width="9" height="6"/>
        <rect x="-38" y="-26" width="9" height="6"/>
        <rect x="-25" y="-26" width="9" height="6"/>
      </g>
    </g>

    <!-- Medium building -->
    <g transform="translate(200,230)" opacity="0.18">
      <polygon points="0,-70 45,-48 45,22 0,44 -45,22 -45,-48" fill="none" stroke="#F59E0B" stroke-width="2"/>
      <line x1="0" y1="-70" x2="0" y2="0" stroke="#F59E0B" stroke-width="1.2"/>
      <line x1="45" y1="-48" x2="0" y2="0" stroke="#F59E0B" stroke-width="1.2"/>
      <polygon points="0,-70 45,-48 0,0 -45,-48" fill="#F59E0B" opacity="0.1"/>
    </g>

    <!-- Small block -->
    <g transform="translate(60,280)" opacity="0.15">
      <polygon points="0,-30 28,-15 28,15 0,30 -28,15 -28,-15" fill="none" stroke="#D97706" stroke-width="1.8"/>
      <polygon points="0,-30 28,-15 0,0 -28,-15" fill="#D97706" opacity="0.1"/>
    </g>

    <!-- ===== CENTER-LEFT: Code brackets ===== -->
    <g transform="translate(340,90)" font-family="'JetBrains Mono', monospace" opacity="0.14">
      <text x="0" y="0" font-size="100" fill="#D97706">{</text>
      <text x="160" y="0" font-size="100" fill="#D97706">}</text>
    </g>

    <!-- Code lines inside brackets -->
    <g transform="translate(400,50)" stroke="#FAFAF9" stroke-width="2" opacity="0.12" stroke-linecap="round">
      <line x1="0" y1="0" x2="65" y2="0"/>
      <line x1="10" y1="14" x2="50" y2="14"/>
      <line x1="10" y1="28" x2="72" y2="28"/>
      <line x1="10" y1="42" x2="38" y2="42"/>
      <line x1="0" y1="56" x2="58" y2="56"/>
    </g>

    <!-- ===== CENTER: BIM cube ===== -->
    <g transform="translate(620,100)" opacity="0.22">
      <rect x="20" y="-20" width="80" height="80" fill="none" stroke="#FAFAF9" stroke-width="1" opacity="0.4"/>
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#D97706" stroke-width="2.5"/>
      <line x1="0" y1="0" x2="20" y2="-20" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
      <line x1="80" y1="0" x2="100" y2="-20" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
      <line x1="80" y1="80" x2="100" y2="60" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="80" x2="20" y2="60" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
      <polygon points="0,0 20,-20 100,-20 80,0" fill="#D97706" opacity="0.1"/>
      <text x="16" y="50" font-family="'JetBrains Mono', monospace" font-size="22" fill="#D97706" font-weight="bold">BIM</text>
    </g>

    <!-- ===== RIGHT-CENTER: Structural elements ===== -->

    <!-- I-profile -->
    <g transform="translate(830,120)" opacity="0.20">
      <path d="M-28,0 L28,0 L28,6 L12,6 L12,50 L28,50 L28,56 L-28,56 L-28,50 L-12,50 L-12,6 L-28,6 Z"
        fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2"/>
    </g>

    <!-- Truss triangle -->
    <g transform="translate(950,100)" opacity="0.20">
      <polygon points="0,-60 70,0 -70,0" fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-width="2"/>
      <line x1="0" y1="-60" x2="0" y2="0" stroke="#F59E0B" stroke-width="1.2"/>
      <line x1="-35" y1="-30" x2="35" y2="-30" stroke="#F59E0B" stroke-width="1"/>
    </g>

    <!-- ===== FAR RIGHT: More building blocks ===== -->
    <g transform="translate(1150,180)" opacity="0.18">
      <polygon points="0,-50 40,-28 40,22 0,44 -40,22 -40,-28" fill="none" stroke="#D97706" stroke-width="2"/>
      <line x1="0" y1="-50" x2="0" y2="0" stroke="#D97706" stroke-width="1.2"/>
      <line x1="40" y1="-28" x2="0" y2="0" stroke="#D97706" stroke-width="1.2"/>
      <polygon points="0,-50 40,-28 0,0 -40,-28" fill="#D97706" opacity="0.1"/>
    </g>

    <g transform="translate(1250,220)" opacity="0.15">
      <polygon points="0,-30 25,-15 25,15 0,30 -25,15 -25,-15" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
      <polygon points="0,-30 25,-15 0,0 -25,-15" fill="#F59E0B" opacity="0.08"/>
    </g>

    <!-- Additional blocks far right -->
    <g transform="translate(1380,160)" opacity="0.12">
      <polygon points="0,-40 35,-22 35,18 0,36 -35,18 -35,-22" fill="none" stroke="#D97706" stroke-width="1.8"/>
      <polygon points="0,-40 35,-22 0,0 -35,-22" fill="#D97706" opacity="0.08"/>
    </g>

    <g transform="translate(1480,240)" opacity="0.10">
      <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    </g>

    <!-- ===== NETWORK CONNECTIONS ===== -->
    <g opacity="0.18">
      <circle cx="100" cy="180" r="4" fill="#D97706"/>
      <circle cx="200" cy="230" r="4" fill="#F59E0B"/>
      <circle cx="60" cy="280" r="3" fill="#D97706"/>
      <circle cx="430" cy="110" r="3.5" fill="#D97706"/>
      <circle cx="660" cy="140" r="4" fill="#D97706"/>
      <circle cx="830" cy="148" r="3.5" fill="#F59E0B"/>
      <circle cx="950" cy="100" r="3.5" fill="#F59E0B"/>
      <circle cx="1150" cy="180" r="3.5" fill="#D97706"/>
      <circle cx="1250" cy="220" r="3" fill="#F59E0B"/>
      <circle cx="1380" cy="160" r="3" fill="#D97706"/>

      <line x1="105" y1="182" x2="195" y2="228" stroke="#D97706" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="65" y1="278" x2="95" y2="185" stroke="#D97706" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="205" y1="228" x2="426" y2="112" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="434" y1="110" x2="656" y2="140" stroke="#D97706" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="664" y1="140" x2="826" y2="148" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="834" y1="146" x2="946" y2="103" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="954" y1="102" x2="1146" y2="178" stroke="#D97706" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="1154" y1="182" x2="1246" y2="218" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="5,5"/>
      <line x1="1254" y1="218" x2="1376" y2="162" stroke="#D97706" stroke-width="0.8" stroke-dasharray="5,5"/>
    </g>

    <!-- ===== SKYLINE SILHOUETTE (bottom) ===== -->
    <g transform="translate(0,310)" opacity="0.08">
      <path d="M0,86 L0,60 L25,60 L25,40 L40,40 L40,55 L60,55 L60,25 L66,25 L66,12 L72,12 L72,25 L90,25 L90,45 L115,45 L115,18 L124,18 L124,8 L136,8 L136,3 L148,3 L148,8 L160,8 L160,18 L170,18 L170,45 L195,45 L195,30 L215,30 L215,45 L240,45 L240,15 L246,15 L246,6 L254,6 L254,15 L268,15 L268,45 L295,45 L295,55 L320,55 L320,40 L340,40 L340,55 L370,55 L370,35 L382,28 L394,35 L394,55 L425,55 L425,45 L450,45 L450,35 L468,35 L468,45 L495,45 L495,25 L506,25 L506,12 L518,12 L518,25 L538,25 L538,45 L565,45 L565,55 L595,55 L595,40 L618,40 L618,55 L648,55 L648,28 L660,28 L660,18 L672,18 L672,28 L692,28 L692,50 L718,50 L718,32 L742,32 L742,18 L755,18 L755,8 L768,8 L768,18 L782,18 L782,32 L808,32 L808,50 L838,50 L838,40 L862,40 L862,55 L895,55 L895,32 L908,32 L908,22 L922,22 L922,32 L942,32 L942,55 L975,55 L975,45 L1000,45 L1000,28 L1015,28 L1015,18 L1028,18 L1028,28 L1048,28 L1048,45 L1078,45 L1078,55 L1108,55 L1108,40 L1132,40 L1132,22 L1145,22 L1145,12 L1158,12 L1158,22 L1175,22 L1175,40 L1205,40 L1205,55 L1238,55 L1238,42 L1260,42 L1260,55 L1290,55 L1290,38 L1308,38 L1308,48 L1340,48 L1340,55 L1380,55 L1380,40 L1400,40 L1400,55 L1430,55 L1430,42 L1455,42 L1455,55 L1490,55 L1490,48 L1520,48 L1520,55 L1584,55 L1584,86 Z" fill="#FAFAF9"/>
    </g>

    <!-- ===== LOGO & TEXT (center-right, above profile picture zone) ===== -->

    <!-- Logo symbol -->
    <g transform="translate(792,148) scale(0.42)">
      <polygon points="-60,-20 0,15 0,80 -60,45"
        fill="#D97706" fill-opacity="0.30"
        stroke="#D97706" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="0,-55 60,-20 0,15 -60,-20"
        fill="#D97706" fill-opacity="0.18"
        stroke="#D97706" stroke-width="3" stroke-linejoin="round"/>
      <line x1="60" y1="-20" x2="60" y2="45" stroke="#D97706" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="80" x2="60" y2="45" stroke="#D97706" stroke-width="3" stroke-linecap="round"/>
      <polygon points="60,-20 0,15 0,32 60,0" fill="url(#amberGrad)" fill-opacity="0.18"/>
      <line x1="0" y1="15" x2="0" y2="32" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="32" x2="60" y2="0" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- Wordmark -->
    <text x="830" y="158" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="48" letter-spacing="-0.025em">
      <tspan fill="#FAFAF9">Open</tspan><tspan fill="#D97706">AEC</tspan>
    </text>

    <!-- Tagline -->
    <text x="832" y="186" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="16" fill="#A1A1AA" letter-spacing="0.04em">
      Free and open-source tools for the built environment.
    </text>

    <!-- URL / Handle -->
    <text x="832" y="212" font-family="'JetBrains Mono', monospace" font-weight="400" font-size="12" fill="#A1A1AA" opacity="0.5" letter-spacing="0.03em">
      openaec.org
    </text>

    <!-- Decorative amber dots around text area -->
    <circle cx="808" cy="230" r="2" fill="#D97706" opacity="0.3"/>
    <circle cx="1120" cy="130" r="2" fill="#F59E0B" opacity="0.25"/>
    <circle cx="1180" cy="195" r="1.5" fill="#D97706" opacity="0.2"/>
  </g>
</svg>
