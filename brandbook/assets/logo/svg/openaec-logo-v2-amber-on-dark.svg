<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <title>OpenAEC Foundation — Logo v2 (amber on dark)</title>
  <defs>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="accentStrip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="140" rx="12" fill="#2A2A32"/>

  <!-- Accent gradient strip at top -->
  <rect x="0" y="0" width="520" height="3" rx="12" fill="url(#accentStrip)"/>

  <!-- Symbol: Clean isometric open cube -->
  <g transform="translate(70,68) scale(0.52)">
    <!-- Left face (main visible face) -->
    <polygon points="-60,-20 0,15 0,80 -60,45"
      fill="#D97706" fill-opacity="0.22"
      stroke="#D97706" stroke-width="2.8" stroke-linejoin="round"/>

    <!-- Top face -->
    <polygon points="0,-55 60,-20 0,15 -60,-20"
      fill="#D97706" fill-opacity="0.12"
      stroke="#D97706" stroke-width="2.8" stroke-linejoin="round"/>

    <!-- Right face: open — just edges -->
    <line x1="60" y1="-20" x2="60" y2="45" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="0" y1="80" x2="60" y2="45" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Inner shelf — the "open" detail -->
    <polygon points="60,-20 0,15 0,32 60,0"
      fill="url(#amberGrad)" fill-opacity="0.18"/>
    <line x1="0" y1="15" x2="0" y2="32" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="32" x2="60" y2="0" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Subtle gold accent lines -->
    <line x1="0" y1="32" x2="-28" y2="48" stroke="#F59E0B" stroke-width="1.2" opacity="0.3"/>
    <line x1="60" y1="0" x2="32" y2="16" stroke="#F59E0B" stroke-width="1.2" opacity="0.3"/>

    <!-- Window grid on left face — clean 2x3 -->
    <g stroke="#D97706" stroke-width="1.2" fill="none" opacity="0.55">
      <rect x="-44" y="-6" width="10" height="7" rx="1" transform="skewY(-30) translate(0,0)"/>
      <rect x="-30" y="-6" width="10" height="7" rx="1" transform="skewY(-30) translate(0,0)"/>
      <rect x="-44" y="6" width="10" height="7" rx="1" transform="skewY(-30) translate(0,0)"/>
      <rect x="-30" y="6" width="10" height="7" rx="1" transform="skewY(-30) translate(0,0)"/>
      <rect x="-44" y="18" width="10" height="7" rx="1" transform="skewY(-30) translate(0,0)"/>
      <rect x="-30" y="18" width="10" height="7" rx="1" transform="skewY(-30) translate(0,0)"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="40" letter-spacing="-0.025em">
    <tspan fill="#FAFAF9">Open</tspan><tspan fill="#D97706">AEC</tspan>
  </text>

  <!-- Tagline -->
  <text x="122" y="88" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#A1A1AA" letter-spacing="0.06em">
    Build free. Build together.
  </text>

  <!-- Foundation label -->
  <text x="122" y="108" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="10" fill="#A1A1AA" opacity="0.6" letter-spacing="0.15em">
    FOUNDATION
  </text>
</svg>
