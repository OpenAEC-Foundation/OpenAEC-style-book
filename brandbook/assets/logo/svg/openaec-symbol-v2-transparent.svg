<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160" width="140" height="160">
  <title>OpenAEC Foundation — Symbol v2 (transparent)</title>
  <defs>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <g transform="translate(70,78)">
    <!-- Left face (main visible face) -->
    <polygon points="-60,-20 0,15 0,80 -60,45"
      fill="#D97706" fill-opacity="0.22"
      stroke="#D97706" stroke-width="2.8" stroke-linejoin="round"/>

    <!-- Top face -->
    <polygon points="0,-55 60,-20 0,15 -60,-20"
      fill="#D97706" fill-opacity="0.12"
      stroke="#D97706" stroke-width="2.8" stroke-linejoin="round"/>

    <!-- Right face: open edges only -->
    <line x1="60" y1="-20" x2="60" y2="45" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="0" y1="80" x2="60" y2="45" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Inner shelf detail -->
    <polygon points="60,-20 0,15 0,32 60,0"
      fill="url(#amberGrad)" fill-opacity="0.18"/>
    <line x1="0" y1="15" x2="0" y2="32" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="32" x2="60" y2="0" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Subtle accent lines -->
    <line x1="0" y1="32" x2="-28" y2="48" stroke="#F59E0B" stroke-width="1.2" opacity="0.3"/>
    <line x1="60" y1="0" x2="32" y2="16" stroke="#F59E0B" stroke-width="1.2" opacity="0.3"/>
    <line x1="-28" y1="48" x2="32" y2="16" stroke="#F59E0B" stroke-width="1" opacity="0.18"/>

    <!-- Window grid on left face -->
    <g stroke="#D97706" stroke-width="1.2" fill="none" opacity="0.55">
      <rect x="-44" y="-6" width="10" height="7" rx="1" transform="skewY(-30)"/>
      <rect x="-30" y="-6" width="10" height="7" rx="1" transform="skewY(-30)"/>
      <rect x="-44" y="6" width="10" height="7" rx="1" transform="skewY(-30)"/>
      <rect x="-30" y="6" width="10" height="7" rx="1" transform="skewY(-30)"/>
      <rect x="-44" y="18" width="10" height="7" rx="1" transform="skewY(-30)"/>
      <rect x="-30" y="18" width="10" height="7" rx="1" transform="skewY(-30)"/>
    </g>
  </g>
</svg>
